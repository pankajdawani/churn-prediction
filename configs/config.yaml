# retraining it below params
model:
  name: "RandomForest_SMOTE"
  artifact_path: "models/artifacts/churn_model.joblib"

  params:
    n_estimators: 500
    max_depth: 6
    min_samples_leaf: 8
    min_samples_split: 8
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1


