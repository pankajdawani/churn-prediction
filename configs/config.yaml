# ──────────────────────────────────────────────────────────────────────────────
# Churn Prediction Project — Master Configuration
# ──────────────────────────────────────────────────────────────────────────────

# ── Data settings ─────────────────────────────────────────────────────────────
data:
  raw_path: "data/raw/ecommerce_churn.csv"
  processed_path: "data/processed/churn_processed.csv"
  test_size: 0.2          # 20% held out for evaluation
  random_state: 42        # reproducibility seed

# ── Feature settings ──────────────────────────────────────────────────────────
features:
  target: "churn"

  drop_cols:
    - "customer_id"
    - "coupon_used"           # identical for both groups
    - "order_count_l6m"       # identical for both groups
    - "warehouse_to_home_km"  # identical for both groups
    - "hours_on_app"          # identical for both groups

  numeric:
    - "tenure_months"
    - "city_tier"
    - "devices_registered"
    - "order_amount_hike_pct"
    - "day_since_last_order"
    - "cashback_amount"
    - "satisfaction_score"
    - "complain"
    - "number_of_address"

  categorical:
    - "preferred_login_device"
    - "preferred_payment_mode"
    - "preferred_order_cat"
    - "gender"



